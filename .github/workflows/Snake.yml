name: Snake animation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Generate snake
        uses: kordy/take-snake-action@v1
        with:
          fileName: 'github-contribution-grid-snake.svg'
